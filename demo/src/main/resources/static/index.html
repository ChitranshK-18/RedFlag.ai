<!DOCTYPE html>
<html>
<head>
    <title>RedFlag.ai</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            overflow-x: hidden;
        }

        /* 🔥 Liquid Glow Background */
        body::before {
            content: "";
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,0,0,0.4), transparent);
            filter: blur(120px);
            top: -100px;
            left: -100px;
        }

        body::after {
            content: "";
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0,255,255,0.3), transparent);
            filter: blur(120px);
            bottom: -100px;
            right: -100px;
        }

        h1 {
            margin-top: 40px;
            font-size: 40px;
            text-align: center;
        }

        .container {
            margin: 40px auto;
            width: 60%;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border-radius: 15px;
            border: none;
            font-size: 16px;
            outline: none;
        }

        button {
            margin-top: 15px;
            padding: 12px 25px;
            border-radius: 15px;
            border: none;
            background: linear-gradient(45deg, red, orange);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px red;
        }

        .card {
            margin-top: 25px;
            padding: 20px;
            border-radius: 15px;
            background: rgba(255,255,255,0.08);
        }

        .high { color: #ff4d4d; }
        .mid { color: #ffcc00; }
        .low { color: #4dff88; }

        .loader {
            margin-top: 20px;
            display: none;
        }
    </style>
</head>

<body>

<h1>🚨 RedFlag.ai</h1>

<div class="container">
    <textarea id="msg" placeholder="Paste suspicious message..."></textarea><br>
    <button onclick="analyze()">Analyze</button>

    <div class="loader" id="loader">🔍 Analyzing...</div>

    <div class="card" id="result"></div>
</div>

<script>
    async function analyze() {

        let message = document.getElementById("msg").value;
        let loader = document.getElementById("loader");
        let result = document.getElementById("result");

        loader.style.display = "block";
        result.innerHTML = "";

        let res = await fetch("/api/analyze", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message})
        });

        let data = await res.json();

        loader.style.display = "none";

        let color = data.riskScore > 60 ? "high" :
                    data.riskScore > 30 ? "mid" : "low";

        result.innerHTML = `
            <h2 class="${color}">${data.verdict} (${data.riskScore}%)</h2>

            <p><b>🧠 AI Analysis:</b><br>${data.aiExplanation}</p>

            <p><b>🚩 Red Flags:</b><br>${data.flags.join("<br>")}</p>
        `;
    }
</script>

</body>
</html>
