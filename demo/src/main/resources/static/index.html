<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedFlag.ai</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Segoe UI',sans-serif;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#050816;
            overflow-x:hidden;
            overflow-y:auto;
            color:white;
            position:relative;
        }

        /* BACKGROUND GLOW EFFECTS */

        body::before{
            content:"";
            position:absolute;
            width:500px;
            height:500px;
            background:rgba(255,0,80,0.25);
            filter:blur(140px);
            top:-120px;
            left:-120px;
            border-radius:50%;
        }

        body::after{
            content:"";
            position:absolute;
            width:500px;
            height:500px;
            background:rgba(0,200,255,0.18);
            filter:blur(140px);
            bottom:-150px;
            right:-120px;
            border-radius:50%;
        }

        .main-container{
            width:90%;
            max-width:950px;
            padding:40px;
            border-radius:28px;

            background:rgba(255,255,255,0.05);
            backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,0.08);

            box-shadow:
                    0 0 50px rgba(0,0,0,0.5),
                    inset 0 0 1px rgba(255,255,255,0.1);

            position:relative;
            z-index:5;
        }

        .title{
            text-align:center;
            margin-bottom:35px;
        }

        .title h1{
            font-size:52px;
            font-weight:700;
            letter-spacing:1px;
        }

        .title span{
            color:#ff3c6f;
        }

        .subtitle{
            margin-top:8px;
            color:#94a3b8;
            font-size:15px;
        }

        .input-box{
            margin-top:20px;
        }

        textarea{
            width:100%;
            height:180px;
            padding:22px;

            border:none;
            outline:none;
            resize:none;

            border-radius:22px;

            background:rgba(255,255,255,0.08);

            color:white;
            font-size:16px;
            line-height:1.6;

            border:1px solid rgba(255,255,255,0.06);

            transition:0.3s;
        }

        textarea:focus{
            border:1px solid rgba(255,0,80,0.5);
            box-shadow:0 0 25px rgba(255,0,80,0.2);
        }

        textarea::placeholder{
            color:#94a3b8;
        }

        .btn{
            margin-top:22px;
            display:flex;
            justify-content:center;
        }

        button{
            padding:14px 38px;
            border:none;
            border-radius:16px;

            background:linear-gradient(135deg,#ff0055,#ff7b00);

            color:white;
            font-size:16px;
            font-weight:600;

            cursor:pointer;

            transition:0.3s ease;
        }

        button:hover{
            transform:translateY(-2px) scale(1.03);

            box-shadow:
                    0 0 25px rgba(255,0,80,0.45);
        }

        .loader{
            margin-top:25px;
            text-align:center;
            color:#cbd5e1;
            display:none;
        }

        .result-card{
            margin-top:30px;
            padding:28px;

            border-radius:24px;

            background:rgba(255,255,255,0.06);

            border:1px solid rgba(255,255,255,0.06);

            display:none;
        }

        .risk-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
            gap:10px;
        }

        .risk-title{
            font-size:34px;
            font-weight:700;
        }

        .risk-score{
            padding:10px 18px;
            border-radius:14px;
            font-weight:700;
            font-size:18px;
        }

        .high{
            color:#ff4d6d;
            background:rgba(255,77,109,0.12);
        }

        .mid{
            color:#ffd166;
            background:rgba(255,209,102,0.12);
        }

        .low{
            color:#06d6a0;
            background:rgba(6,214,160,0.12);
        }

        .section{
            margin-top:28px;
        }

        .section h3{
            margin-bottom:10px;
            color:#f8fafc;
            font-size:20px;
        }

        .section p{
            color:#cbd5e1;
            line-height:1.7;
        }

        .flags{
            margin-top:10px;
        }

        .flag{
            margin-top:10px;
            padding:12px 15px;

            border-radius:14px;

            background:rgba(255,255,255,0.05);

            color:#f1f5f9;
        }

        @media(max-width:768px){

            .main-container{
                width:95%;
                padding:25px;
            }

            .title h1{
                font-size:38px;
            }

            .risk-title{
                font-size:28px;
            }

        }

    </style>
</head>

<body>

<div class="main-container">

    <div class="title">
        <h1>🚨 RedFlag<span>.ai</span></h1>
        <p class="subtitle">
            AI-Powered Scam & Phishing Detection System
        </p>
    </div>

    <div class="input-box">
        <textarea
                id="msg"
                placeholder="Paste suspicious message, email, SMS or phishing content here..."
        ></textarea>
    </div>

    <div class="btn">
        <button onclick="analyze()">
            Analyze Threat
        </button>
    </div>

    <div class="loader" id="loader">
        🔍 AI Engine Scanning Message...
    </div>

    <div class="result-card" id="result"></div>

</div>

<script>

    async function analyze(){

        let message = document.getElementById("msg").value;

        let loader = document.getElementById("loader");
        let result = document.getElementById("result");

        loader.style.display = "block";
        result.style.display = "none";

        let res = await fetch("/api/analyze",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({message})

        });

        let data = await res.json();

        loader.style.display = "none";
        result.style.display = "block";

        let color = data.riskScore > 60 ? "high" :
                    data.riskScore > 30 ? "mid" : "low";

        result.innerHTML = `

            <div class="risk-header">

                <div class="risk-title ${color}">
                    ${data.verdict}
                </div>

                <div class="risk-score ${color}">
                    Risk Score: ${data.riskScore}%
                </div>

            </div>

            <div class="section">
                <h3>🧠 AI Analysis</h3>

                <p>
                    ${data.aiExplanation}
                </p>
            </div>

            <div class="section">
                <h3>🚩 Detected Red Flags</h3>

                <div class="flags">

                    ${data.flags.map(flag =>
                        `<div class="flag">${flag}</div>`
                    ).join("")}

                </div>
            </div>

        `;
    }

</script>

</body>
</html>
